name: CI/CD Pipeline

# Client promotion pipeline — image built on dev, promoted through envs by retagging.
#
# Required GitHub repo variables (Settings → Secrets and variables → Actions → Variables):
#   CLIENT_SLUG               e.g. smartacus
#   EXTERNAL_GITLAB_REGISTRY  e.g. registry.gitlab.com
#   EXTERNAL_PATH             e.g. ordomatics/clients/smartacus
#
# Required GitHub repo secrets:
#   GITLAB_USERNAME           GitLab username with registry push access
#   GITLAB_ACCESS_TOKEN       GitLab personal access token
#   GIT_TOKEN                 GitHub PAT with access to private submodules
#
# Branch model:
#   dev     → build + push dev-latest → test-promote (chained)
#   staging → pull test-latest + validate + promote → values.<slug>-staging.yaml
#   main    → pull test-latest + promote             → values.<slug>-prod.yaml

on:
  push:
    branches: [dev, staging, main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: "Retrigger promotion for this environment"
        type: choice
        options: [test, staging, prod]

env:
  REGISTRY: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}
  IMAGE_PATH: ${{ vars.EXTERNAL_PATH }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - name: Check required variables
        run: |
          [ -n "${{ vars.CLIENT_SLUG }}" ] || { echo "ERROR: CLIENT_SLUG repo variable is not set. See README for setup instructions."; exit 1; }
          [ -n "${{ vars.EXTERNAL_GITLAB_REGISTRY }}" ] || { echo "ERROR: EXTERNAL_GITLAB_REGISTRY repo variable is not set."; exit 1; }
          [ -n "${{ vars.EXTERNAL_PATH }}" ] || { echo "ERROR: EXTERNAL_PATH repo variable is not set."; exit 1; }

      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GIT_TOKEN }}

      - name: Initialize submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --recursive --force --depth=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure registry credentials
        run: |
          PLATFORM_AUTH=$(echo -n "tenant-pull:${{ secrets.IMAGE_ACCESS_TOKEN }}" | base64 -w0)
          CLIENT_AUTH=$(echo -n "${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_ACCESS_TOKEN }}" | base64 -w0)
          mkdir -p ~/.docker
          cat > ~/.docker/config.json <<EOF
          {
            "auths": {
              "registry.gitlab.com/ordomatics/helm": {"auth": "${PLATFORM_AUTH}"},
              "registry.gitlab.com/ordomatics/clients": {"auth": "${CLIENT_AUTH}"}
            }
          }
          EOF

      - name: Build and push dev-latest
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PATH }}:dev-latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GIT_TOKEN }}

      - name: Build summary
        run: |
          echo "### Build" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PATH }}:dev-latest\`" >> $GITHUB_STEP_SUMMARY

  test-promote:
    needs: [build]
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs.build.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'test')
      )
    concurrency:
      group: deploy-test
      cancel-in-progress: false
    environment:
      name: test
      url: https://${{ vars.CLIENT_SLUG }}.test.ordomatics.com
    env:
      IMAGE: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}/${{ vars.EXTERNAL_PATH }}
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: odoo
      DB_PASSWORD: odoo
      DB_NAME: test_db
      ADMIN_PASSWD: testpassword
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check required variables
        run: |
          [ -n "${{ vars.CLIENT_SLUG }}" ] || { echo "ERROR: CLIENT_SLUG repo variable is not set. See README for setup instructions."; exit 1; }
          [ -n "${{ vars.EXTERNAL_GITLAB_REGISTRY }}" ] || { echo "ERROR: EXTERNAL_GITLAB_REGISTRY repo variable is not set."; exit 1; }
          [ -n "${{ vars.EXTERNAL_PATH }}" ] || { echo "ERROR: EXTERNAL_PATH repo variable is not set."; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_ACCESS_TOKEN }}

      - name: Pull dev-latest
        run: docker pull ${{ env.IMAGE }}:dev-latest

      - name: Test — Odoo CLI
        run: docker run --rm --entrypoint="" ${{ env.IMAGE }}:dev-latest odoo --version

      - name: Test — Base module init
        run: |
          docker run --rm --network host \
            -e DB_HOST=localhost -e DB_PORT=5432 -e DB_USER=odoo \
            -e DB_PASSWORD=odoo -e DB_NAME=test_db \
            -e ADMIN_PASSWD=${{ env.ADMIN_PASSWD }} -e SKIP_MODULE_SETUP=true \
            ${{ env.IMAGE }}:dev-latest \
            odoo -i base -d test_db --stop-after-init --log-level=warn

      - name: Test — Container health check
        run: |
          CONTAINER_ID=$(docker run -d --network host \
            -e DB_HOST=localhost -e DB_PORT=5432 -e DB_USER=odoo \
            -e DB_PASSWORD=odoo -e DB_NAME=test_db \
            -e ADMIN_PASSWD=${{ env.ADMIN_PASSWD }} -e SKIP_MODULE_SETUP=true \
            ${{ env.IMAGE }}:dev-latest)
          SUCCESS=false
          for i in {1..20}; do
            sleep 3
            docker ps -q --filter id=${CONTAINER_ID} | grep -q . || { docker logs ${CONTAINER_ID}; exit 1; }
            curl -fsS http://localhost:8069/web/health > /dev/null 2>&1 && SUCCESS=true && break
          done
          docker logs ${CONTAINER_ID} | tail -10; docker stop ${CONTAINER_ID}
          [ "$SUCCESS" = true ] || { echo "Health check timed out"; exit 1; }

      - name: Compute tag
        id: tag
        run: echo "tag=test-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Retag and push
        run: |
          docker tag ${{ env.IMAGE }}:dev-latest ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker tag ${{ env.IMAGE }}:dev-latest ${{ env.IMAGE }}:test-latest
          docker push ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE }}:test-latest

      - name: Update helm values
        uses: ./.github/actions/deploy-helm
        with:
          values-file: chart/values.${{ vars.CLIENT_SLUG }}-test.yaml
          image-tag: ${{ steps.tag.outputs.tag }}
          commit-message: "ci: promote ${{ vars.CLIENT_SLUG }}@${{ steps.tag.outputs.tag }}"
          helm-gitlab-token: ${{ secrets.HELM_GITLAB_TOKEN }}

      - name: Promote summary
        run: |
          echo "### Promoted to test" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**ArgoCD:** https://argocd.ordomatics.com/applications/${{ vars.CLIENT_SLUG }}-test" >> $GITHUB_STEP_SUMMARY

  staging-promote:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    environment:
      name: staging
      url: https://${{ vars.CLIENT_SLUG }}.staging.ordomatics.com
    env:
      IMAGE: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}/${{ vars.EXTERNAL_PATH }}
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: odoo
      DB_PASSWORD: odoo
      DB_NAME: test_db
      ADMIN_PASSWD: testpassword
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check required variables
        run: |
          [ -n "${{ vars.CLIENT_SLUG }}" ] || { echo "ERROR: CLIENT_SLUG repo variable is not set. See README for setup instructions."; exit 1; }
          [ -n "${{ vars.EXTERNAL_GITLAB_REGISTRY }}" ] || { echo "ERROR: EXTERNAL_GITLAB_REGISTRY repo variable is not set."; exit 1; }
          [ -n "${{ vars.EXTERNAL_PATH }}" ] || { echo "ERROR: EXTERNAL_PATH repo variable is not set."; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_ACCESS_TOKEN }}

      - name: Pull test-latest
        run: docker pull ${{ env.IMAGE }}:test-latest

      - name: Test — Odoo CLI
        run: docker run --rm --entrypoint="" ${{ env.IMAGE }}:test-latest odoo --version

      - name: Test — Base module init
        run: |
          docker run --rm --network host \
            -e DB_HOST=localhost -e DB_PORT=5432 -e DB_USER=odoo \
            -e DB_PASSWORD=odoo -e DB_NAME=test_db \
            -e ADMIN_PASSWD=${{ env.ADMIN_PASSWD }} -e SKIP_MODULE_SETUP=true \
            ${{ env.IMAGE }}:test-latest \
            odoo -i base -d test_db --stop-after-init --log-level=warn

      - name: Test — Container health check
        run: |
          CONTAINER_ID=$(docker run -d --network host \
            -e DB_HOST=localhost -e DB_PORT=5432 -e DB_USER=odoo \
            -e DB_PASSWORD=odoo -e DB_NAME=test_db \
            -e ADMIN_PASSWD=${{ env.ADMIN_PASSWD }} -e SKIP_MODULE_SETUP=true \
            ${{ env.IMAGE }}:test-latest)
          SUCCESS=false
          for i in {1..20}; do
            sleep 3
            docker ps -q --filter id=${CONTAINER_ID} | grep -q . || { docker logs ${CONTAINER_ID}; exit 1; }
            curl -fsS http://localhost:8069/web/health > /dev/null 2>&1 && SUCCESS=true && break
          done
          docker logs ${CONTAINER_ID} | tail -10; docker stop ${CONTAINER_ID}
          [ "$SUCCESS" = true ] || { echo "Health check timed out"; exit 1; }

      - name: Compute tag
        id: tag
        run: echo "tag=staging-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Retag and push
        run: |
          docker tag ${{ env.IMAGE }}:test-latest ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker tag ${{ env.IMAGE }}:test-latest ${{ env.IMAGE }}:staging-latest
          docker push ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE }}:staging-latest

      - name: Update helm values
        uses: ./.github/actions/deploy-helm
        with:
          values-file: chart/values.${{ vars.CLIENT_SLUG }}-staging.yaml
          image-tag: ${{ steps.tag.outputs.tag }}
          commit-message: "ci: promote ${{ vars.CLIENT_SLUG }}@${{ steps.tag.outputs.tag }} to staging"
          helm-gitlab-token: ${{ secrets.HELM_GITLAB_TOKEN }}

      - name: Promote summary
        run: |
          echo "### Promoted to staging" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**ArgoCD:** https://argocd.ordomatics.com/applications/${{ vars.CLIENT_SLUG }}-staging" >> $GITHUB_STEP_SUMMARY

  prod-promote:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    environment:
      name: production
      url: https://${{ vars.CLIENT_SLUG }}.ordomatics.com
    env:
      IMAGE: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}/${{ vars.EXTERNAL_PATH }}
    steps:
      - name: Check required variables
        run: |
          [ -n "${{ vars.CLIENT_SLUG }}" ] || { echo "ERROR: CLIENT_SLUG repo variable is not set. See README for setup instructions."; exit 1; }
          [ -n "${{ vars.EXTERNAL_GITLAB_REGISTRY }}" ] || { echo "ERROR: EXTERNAL_GITLAB_REGISTRY repo variable is not set."; exit 1; }
          [ -n "${{ vars.EXTERNAL_PATH }}" ] || { echo "ERROR: EXTERNAL_PATH repo variable is not set."; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.EXTERNAL_GITLAB_REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_ACCESS_TOKEN }}

      - name: Pull test-latest
        run: docker pull ${{ env.IMAGE }}:test-latest

      - name: Compute tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "tags=${{ env.IMAGE }}:${VERSION},${{ env.IMAGE }}:latest" >> $GITHUB_OUTPUT
            echo "primary=${VERSION}" >> $GITHUB_OUTPUT
          else
            PROD_TAG="prod-${GITHUB_SHA::8}"
            echo "tags=${{ env.IMAGE }}:${PROD_TAG},${{ env.IMAGE }}:latest" >> $GITHUB_OUTPUT
            echo "primary=${PROD_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Retag and push
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            docker tag ${{ env.IMAGE }}:test-latest $tag
            docker push $tag
          done

      - name: Update helm values
        uses: ./.github/actions/deploy-helm
        with:
          values-file: chart/values.${{ vars.CLIENT_SLUG }}-prod.yaml
          image-tag: ${{ steps.tags.outputs.primary }}
          commit-message: "ci: release ${{ vars.CLIENT_SLUG }}@${{ steps.tags.outputs.primary }}"
          helm-gitlab-token: ${{ secrets.HELM_GITLAB_TOKEN }}

      - name: Promote summary
        run: |
          echo "### Released to production" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.tags.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**ArgoCD:** https://argocd.ordomatics.com/applications/${{ vars.CLIENT_SLUG }}-prod" >> $GITHUB_STEP_SUMMARY
